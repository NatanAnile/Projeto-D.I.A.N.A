name: Diana Tests

on:
  push:
  pull_request:

jobs:
  continuity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile core files
        run: |
          python -m py_compile config.py Diana.py runtime/runtime_types.py runtime/input_firewall.py runtime/intent_router.py runtime/ptt_guard.py runtime/conversation_ledger.py runtime/mem0_autosave.py runtime/retrieval_responder.py runtime/output_firewall.py brain/constitution.py brain/prompt_builder.py brain/dialogue_act_gate.py brain/identity_guard.py brain/dialogue_act_policy.py personality/dialogue_response_bank.py personality/joke_bank.py

      - name: Run current continuity test
        run: |
          python tools/tests/test_continuidade_0_5_10_v24_repo_hygiene_ci.py
